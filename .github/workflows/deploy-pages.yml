name: Deploy web app (GitHub Pages)

# Publie l'app Web Bluetooth (dossier web/) sur GitHub Pages — hébergement
# gratuit, HTTPS, aucune configuration serveur. Web Bluetooth EXIGE HTTPS,
# ce que Pages fournit.
#
# Une fois activé (Settings → Pages → Source = GitHub Actions), l'URL est :
#   https://<utilisateur>.github.io/<depot>/

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
