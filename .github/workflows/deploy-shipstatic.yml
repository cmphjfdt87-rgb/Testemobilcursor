name: Deploy ShipStatic mirror

# Héberge web/ sur ShipStatic (text/html correct pour Bluefy).
# Redéployé à chaque push main + tous les 2 jours (évite expiration 3 jours).

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 6 */2 * *"
  workflow_dispatch: {}

permissions:
  contents: write
  deployments: write

concurrency:
  group: shipstatic-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Déployer web/ sur ShipStatic
        id: ship
        uses: shipstatic/action@v1
        with:
          path: ./web
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Mettre à jour web/LIEN.txt et OUVRE-MOI.md
        env:
          SHIP_URL: ${{ steps.ship.outputs.url }}
        run: |
          BACKUP="https://htmlpreview.github.io/?https://raw.githubusercontent.com/cmphjfdt87-rgb/Testemobilcursor/gh-pages/index.html"
          cat > web/LIEN.txt <<EOF
          LIEN PRINCIPAL (ouvre dans Bluefy — affiche l'app, pas le code) :
          ${SHIP_URL}

          LIEN DE SECOURS PERMANENT (ne expire pas) :
          ${BACKUP}

          NE PAS UTILISER (affiche le code source dans Bluefy) :
          https://cdn.jsdelivr.net/gh/cmphjfdt87-rgb/Testemobilcursor@gh-pages/index.html
          EOF
          sed -i "s|https://[a-z0-9-]*\.shipstatic\.com|${SHIP_URL}|g" OUVRE-MOI.md README.md

      - name: Commit LIEN.txt
        env:
          SHIP_URL: ${{ steps.ship.outputs.url }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/LIEN.txt OUVRE-MOI.md README.md
          if git diff --staged --quiet; then
            echo "LIEN.txt inchangé"
          else
            git commit -m "Lien Bluefy: ${SHIP_URL} [skip ci]"
            git push
          fi

      - name: Résumé déploiement
        env:
          SHIP_URL: ${{ steps.ship.outputs.url }}
          CLAIM_URL: ${{ steps.ship.outputs.claim }}
        run: |
          BACKUP="https://htmlpreview.github.io/?https://raw.githubusercontent.com/cmphjfdt87-rgb/Testemobilcursor/gh-pages/index.html"
          {
            echo "## NBX Console — liens Bluefy"
            echo ""
            echo "**Principal (ShipStatic)** : ${SHIP_URL}"
            echo ""
            echo "**Secours permanent** : ${BACKUP}"
            if [ -n "${CLAIM_URL}" ]; then
              echo ""
              echo "Claim (garder le miroir) : ${CLAIM_URL}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
