<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Neon Drift">
<meta name="theme-color" content="#1a0b2e">
<meta name="description" content="NEON DRIFT 3D — le runner de conduite néon ultime. Esquive le trafic, collecte des pièces, débloque des bolides dans la boutique !">
<title>NEON DRIFT 3D</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:#1a0b2e; font-family:-apple-system,'Segoe UI',Arial,sans-serif; color:#fff; user-select:none; -webkit-user-select:none; touch-action:none; overscroll-behavior:none; }
#game { position:fixed; inset:0; display:block; }

/* ---------- COMMON UI ---------- */
.overlay { position:fixed; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; }
.overlay > * { pointer-events:auto; }
.hidden { display:none !important; }

.btn {
  border:none; cursor:pointer; font-family:inherit; font-weight:800;
  text-transform:uppercase; letter-spacing:.12em; color:#1a0b2e;
  background:linear-gradient(135deg,#73eff7,#4cc9f0); font-size:1.15rem;
  padding:16px 54px; border-radius:16px;
  box-shadow:0 6px 0 #2286a8, 0 0 34px rgba(115,239,247,.45);
  transition:transform .08s;
}
.btn:active { transform:translateY(4px); box-shadow:0 2px 0 #2286a8; }
.btn.pink { background:linear-gradient(135deg,#ff6b97,#ff8fab); box-shadow:0 6px 0 #b13e63, 0 0 34px rgba(255,107,151,.45); }
.btn.pink:active { box-shadow:0 2px 0 #b13e63; }
.btn.small { font-size:.9rem; padding:12px 28px; border-radius:12px; }
.btn.ghost { background:rgba(255,255,255,.1); color:#fff; box-shadow:inset 0 0 0 2px rgba(255,255,255,.25); }

/* ---------- LOGO ---------- */
.logo { text-align:center; line-height:.9; margin-bottom:6px; transform:skewX(-6deg); }
.logo .l1 {
  display:block; font-size:clamp(44px, 15vw, 92px); font-weight:900; letter-spacing:.06em;
  color:#73eff7; text-shadow:0 0 12px rgba(115,239,247,.9), 0 0 44px rgba(115,239,247,.5);
}
.logo .l2 {
  display:block; font-size:clamp(52px, 18vw, 110px); font-weight:900; letter-spacing:.04em; font-style:italic;
  background:linear-gradient(180deg,#fff 15%,#ff6b97 45%,#a1045a 55%,#ffd75e 100%);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 4px 0 #4b1248) drop-shadow(0 0 26px rgba(255,107,151,.55));
}
.logo .l3 {
  display:inline-block; margin-top:10px; font-size:clamp(13px,3.6vw,18px); font-weight:800;
  color:#1a0b2e; background:#ffd75e; padding:4px 14px; border-radius:999px; letter-spacing:.35em;
  box-shadow:0 0 22px rgba(255,215,94,.66); transform:skewX(6deg);
}
.tagline { opacity:.75; font-size:.95rem; margin:14px 0 26px; letter-spacing:.04em; }

/* ---------- MENU ---------- */
#menu { justify-content:flex-start; padding-top:max(7vh, env(safe-area-inset-top)); background:linear-gradient(180deg, rgba(26,11,46,.25) 0%, rgba(26,11,46,0) 45%); }
#menu .stack { display:flex; flex-direction:column; gap:14px; align-items:center; margin-top:auto; margin-bottom:max(7vh, env(safe-area-inset-bottom)); }
.bank {
  position:fixed; top:max(14px, env(safe-area-inset-top)); left:14px;
  background:rgba(20,10,36,.72); border:1px solid rgba(255,215,94,.4);
  padding:8px 16px; border-radius:999px; font-weight:800; font-size:1rem; color:#ffd75e;
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
}
#best-label { opacity:.8; font-size:.9rem; margin-top:4px; }

/* ---------- HUD ---------- */
#hud { position:fixed; inset:0; z-index:15; pointer-events:none; }
#hud .score {
  position:absolute; top:max(16px, env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
  font-size:2.5rem; font-weight:900; letter-spacing:.02em;
  text-shadow:0 3px 0 #4b1248, 0 0 26px rgba(115,239,247,.8);
}
#hud .runcoins {
  position:absolute; top:max(20px, env(safe-area-inset-top)); left:16px;
  color:#ffd75e; font-weight:800; font-size:1.1rem; text-shadow:0 2px 0 #4b1248;
}
#hud .speed {
  position:absolute; bottom:max(18px, env(safe-area-inset-bottom)); right:16px;
  font-weight:800; font-style:italic; opacity:.85; font-size:1rem; text-shadow:0 2px 0 #4b1248;
}
#mute {
  position:fixed; top:max(14px, env(safe-area-inset-top)); right:14px; z-index:30;
  background:rgba(20,10,36,.72); border:1px solid rgba(255,255,255,.2); color:#fff;
  width:44px; height:44px; border-radius:50%; font-size:1.2rem; cursor:pointer;
}

/* ---------- SHOP ---------- */
#shop { justify-content:flex-end; background:linear-gradient(180deg, rgba(26,11,46,0) 30%, rgba(16,7,30,.55) 60%); }
.sheet {
  width:100%; max-height:62vh; background:rgba(18,8,34,.92);
  border-radius:26px 26px 0 0; border-top:1px solid rgba(255,107,151,.35);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  padding:18px 16px calc(18px + env(safe-area-inset-bottom));
  display:flex; flex-direction:column; gap:12px;
}
.sheet h2 { text-align:center; letter-spacing:.25em; font-size:1.05rem; color:#ff6b97; text-shadow:0 0 18px rgba(255,107,151,.6); }
.sheet .sub { text-align:center; font-size:.8rem; opacity:.6; margin-top:-8px; }
#cars { display:flex; gap:10px; overflow-x:auto; padding:6px 2px 10px; -webkit-overflow-scrolling:touch; touch-action:pan-x; }
.car-card {
  min-width:128px; background:rgba(255,255,255,.06); border:2px solid rgba(255,255,255,.12);
  border-radius:16px; padding:12px 10px; text-align:center; cursor:pointer; flex-shrink:0;
}
.car-card.selected { border-color:#73eff7; box-shadow:0 0 18px rgba(115,239,247,.35); }
.car-card .emoji { font-size:2rem; }
.car-card .nm { font-weight:800; font-size:.82rem; margin:6px 0 2px; letter-spacing:.04em; }
.car-card .desc { font-size:.66rem; opacity:.55; margin-bottom:8px; min-height:2em; }
.car-card .act {
  display:block; width:100%; border:none; border-radius:9px; padding:8px 4px;
  font-weight:800; font-size:.78rem; cursor:pointer; font-family:inherit;
}
.act.buy { background:#ffd75e; color:#1a0b2e; }
.act.equip { background:#73eff7; color:#1a0b2e; }
.act.equipped { background:rgba(255,255,255,.14); color:#a7f070; }
.act.locked { background:rgba(255,255,255,.1); color:#ff6b97; }
#shop-close { align-self:center; }

/* ---------- GAME OVER ---------- */
#over { background:rgba(12,5,24,.66); }
#over .panel { display:flex; flex-direction:column; align-items:center; gap:10px; padding:20px; }
#over h1 {
  font-size:clamp(40px,12vw,68px); font-weight:900; font-style:italic; letter-spacing:.04em;
  color:#ff6b97; text-shadow:0 0 30px rgba(255,107,151,.8), 0 4px 0 #4b1248;
}
#over .big-score { font-size:clamp(56px,20vw,110px); font-weight:900; text-shadow:0 0 40px rgba(115,239,247,.6); line-height:1; }
#over .earn { color:#ffd75e; font-weight:800; font-size:1.15rem; }
#over .rec { opacity:.75; font-size:.95rem; }
#newrec { color:#a7f070; font-weight:900; letter-spacing:.15em; animation:blink 1s infinite; }
@keyframes blink { 50% { opacity:.3; } }
#over .row { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; justify-content:center; }

/* ---------- FX / TOAST / TUTO ---------- */
#fx { position:fixed; inset:0; z-index:18; pointer-events:none; overflow:hidden; }
.float-txt { position:absolute; font-weight:900; font-size:1.15rem; text-shadow:0 2px 0 #1a0b2e; animation:floatup .8s forwards; }
@keyframes floatup { to { transform:translateY(-70px); opacity:0; } }
#toast {
  position:fixed; bottom:16vh; left:50%; transform:translateX(-50%); z-index:40;
  background:rgba(18,8,34,.94); border:1px solid rgba(255,107,151,.5); border-radius:12px;
  padding:12px 22px; font-weight:700; font-size:.92rem; transition:opacity .3s; opacity:0; pointer-events:none;
  white-space:nowrap;
}
#tuto { position:fixed; inset:0; z-index:16; display:flex; align-items:center; justify-content:space-between; padding:0 8vw; pointer-events:none; }
#tuto span { font-size:3rem; animation:nudge 1s infinite alternate; text-shadow:0 0 20px rgba(115,239,247,.8); }
@keyframes nudge { from { transform:translateX(-8px);} to { transform:translateX(8px);} }
#tuto .lbl { position:absolute; left:50%; bottom:22vh; transform:translateX(-50%); font-weight:800; font-size:1rem; text-align:center; text-shadow:0 2px 0 #1a0b2e; }

#loading { position:fixed; inset:0; z-index:50; background:#1a0b2e; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
.spin { width:44px; height:44px; border-radius:50%; border:4px solid rgba(115,239,247,.2); border-top-color:#73eff7; animation:rot 1s linear infinite; }
@keyframes rot { to { transform:rotate(360deg);} }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="loading"><div class="spin"></div><div style="opacity:.7;font-weight:700;letter-spacing:.2em">CHARGEMENT…</div></div>

<div id="hud" class="hidden">
  <div class="score" id="score">0</div>
  <div class="runcoins" id="runcoins">🪙 0</div>
  <div class="speed" id="speed">0 km/h</div>
</div>

<button id="mute">🔊</button>

<div id="menu" class="overlay">
  <div class="bank" id="bank-menu">🪙 0</div>
  <div class="logo">
    <span class="l1">NEON</span>
    <span class="l2">DRIFT</span>
    <span class="l3">3D</span>
  </div>
  <div class="tagline">Esquive. Collecte. Deviens une légende.</div>
  <div class="stack">
    <button id="play-btn" class="btn">▶ &nbsp;Jouer</button>
    <button id="shop-btn" class="btn pink small">🛒 Boutique</button>
    <div id="best-label">★ Record : 0</div>
  </div>
</div>

<div id="shop" class="overlay hidden">
  <div class="sheet">
    <h2>— GARAGE —</h2>
    <div class="sub" id="shop-sub">Touche un bolide pour le voir en 3D</div>
    <div id="cars"></div>
    <button id="shop-close" class="btn ghost small">Retour</button>
  </div>
</div>

<div id="over" class="overlay hidden">
  <div class="panel">
    <h1>CRASH !</h1>
    <div class="big-score" id="final-score">0</div>
    <div class="earn" id="earned">🪙 +0</div>
    <div class="rec" id="over-best">★ Record : 0</div>
    <div id="newrec" class="hidden">★ NOUVEAU RECORD ★</div>
    <div class="row">
      <button id="retry-btn" class="btn">↻ Rejouer</button>
      <button id="share-btn" class="btn pink small">📤 Partager</button>
      <button id="menu-btn" class="btn ghost small">Menu</button>
    </div>
  </div>
</div>

<div id="tuto" class="hidden">
  <span>👈</span>
  <div class="lbl">BALAYE pour changer de voie</div>
  <span>👉</span>
</div>

<div id="fx"></div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
        onerror="document.getElementById('loading').innerHTML='<div style=&quot;padding:30px;text-align:center;line-height:1.6&quot;>⚠️ Connexion requise pour le premier chargement.<br><button onclick=&quot;location.reload()&quot; style=&quot;margin-top:14px;padding:12px 28px;border:none;border-radius:12px;font-weight:800;background:#73eff7&quot;>Réessayer</button></div>'"></script>
<script>
(() => {
'use strict';

// ================== HELPERS ==================
const $ = (id) => document.getElementById(id);
const LS = { bank:'nd-bank', best:'nd-best', owned:'nd-owned', equip:'nd-equip', tut:'nd-tut' };
const store = {
  get bank()  { return parseInt(localStorage.getItem(LS.bank)  || '0', 10); },
  set bank(v) { localStorage.setItem(LS.bank, v); },
  get best()  { return parseInt(localStorage.getItem(LS.best)  || '0', 10); },
  set best(v) { localStorage.setItem(LS.best, v); },
  get owned() { try { return JSON.parse(localStorage.getItem(LS.owned) || '["gt"]'); } catch(e){ return ['gt']; } },
  set owned(v){ localStorage.setItem(LS.owned, JSON.stringify(v)); },
  get equip() { return localStorage.getItem(LS.equip) || 'gt'; },
  set equip(v){ localStorage.setItem(LS.equip, v); }
};

let toastT = null;
function toast(msg) {
  const el = $('toast');
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(toastT);
  toastT = setTimeout(() => el.style.opacity = '0', 1700);
}

function fxText(txt, color, xr, yr) {
  const el = document.createElement('div');
  el.className = 'float-txt';
  el.textContent = txt;
  el.style.color = color;
  el.style.left = (xr * 100) + '%';
  el.style.top = (yr * 100) + '%';
  $('fx').appendChild(el);
  setTimeout(() => el.remove(), 850);
}

// ================== AUDIO ==================
let AC = null, master = null, musicOn = true, engineOsc = null, engineGain = null, engineFilter = null;
let musicTimer = null, step = 0;
const BASS = [55, 55, 65.4, 55, 43.7, 43.7, 49, 65.4];
const LEAD = [220, 0, 261.6, 329.6, 0, 293.7, 261.6, 0, 220, 0, 174.6, 0, 196, 220, 0, 0];

function initAudio() {
  if (AC) { if (AC.state === 'suspended') AC.resume(); return; }
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = 0.55; master.connect(AC.destination);
    // engine
    engineOsc = AC.createOscillator(); engineOsc.type = 'sawtooth';
    engineFilter = AC.createBiquadFilter(); engineFilter.type = 'lowpass'; engineFilter.frequency.value = 320;
    engineGain = AC.createGain(); engineGain.gain.value = 0;
    engineOsc.connect(engineFilter); engineFilter.connect(engineGain); engineGain.connect(master);
    engineOsc.start();
    // music scheduler
    musicTimer = setInterval(musicStep, 132);
  } catch (e) { AC = null; }
}

function musicStep() {
  if (!AC || !musicOn || state === 'over') return;
  const i8 = step % 8, i16 = step % 16;
  blip(BASS[i8], 0.24, 'triangle', 0.16);
  if (i8 % 2 === 0) kick();
  else hat();
  if (state === 'play' && LEAD[i16]) blip(LEAD[i16] * 2, 0.12, 'square', 0.035);
  step++;
}

function blip(f, d, type, v, slide) {
  if (!AC || !musicOn || !f) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(f, AC.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(slide, AC.currentTime + d);
  g.gain.setValueAtTime(v, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + d);
  o.connect(g); g.connect(master); o.start(); o.stop(AC.currentTime + d);
}

function kick() {
  if (!AC || !musicOn) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(120, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(40, AC.currentTime + 0.12);
  g.gain.setValueAtTime(0.5, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.13);
  o.connect(g); g.connect(master); o.start(); o.stop(AC.currentTime + 0.14);
}

function noiseBuf() {
  const b = AC.createBuffer(1, AC.sampleRate * 0.5, AC.sampleRate);
  const d = b.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  return b;
}
let _noise = null;
function hat() {
  if (!AC || !musicOn) return;
  if (!_noise) _noise = noiseBuf();
  const s = AC.createBufferSource(); s.buffer = _noise;
  const f = AC.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 7000;
  const g = AC.createGain();
  g.gain.setValueAtTime(0.06, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.04);
  s.connect(f); f.connect(g); g.connect(master); s.start(); s.stop(AC.currentTime + 0.05);
}

function sfxCoin()  { blip(988, 0.06, 'square', 0.12); setTimeout(() => blip(1319, 0.14, 'square', 0.12), 55); }
function sfxWhoosh(){
  if (!AC || !musicOn) return;
  if (!_noise) _noise = noiseBuf();
  const s = AC.createBufferSource(); s.buffer = _noise;
  const f = AC.createBiquadFilter(); f.type = 'bandpass'; f.frequency.setValueAtTime(400, AC.currentTime);
  f.frequency.exponentialRampToValueAtTime(2400, AC.currentTime + 0.16);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.16, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.18);
  s.connect(f); f.connect(g); g.connect(master); s.start(); s.stop(AC.currentTime + 0.2);
}
function sfxCrash() {
  if (!AC || !musicOn) return;
  if (!_noise) _noise = noiseBuf();
  const s = AC.createBufferSource(); s.buffer = _noise; s.loop = true;
  const f = AC.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(3200, AC.currentTime);
  f.frequency.exponentialRampToValueAtTime(120, AC.currentTime + 0.7);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.55, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.75);
  s.connect(f); f.connect(g); g.connect(master); s.start(); s.stop(AC.currentTime + 0.8);
  blip(160, 0.5, 'sawtooth', 0.3, 30);
}
function sfxHorn() { blip(392, 0.22, 'square', 0.14); blip(494, 0.22, 'square', 0.14); }
function sfxCash() { blip(660, 0.08, 'square', 0.14); setTimeout(() => blip(880, 0.08, 'square', 0.14), 70); setTimeout(() => blip(1320, 0.2, 'square', 0.14), 140); }
function sfxDeny() { blip(196, 0.2, 'sawtooth', 0.14, 130); }

$('mute').addEventListener('click', (e) => {
  e.stopPropagation();
  musicOn = !musicOn;
  $('mute').textContent = musicOn ? '🔊' : '🔇';
  if (engineGain) engineGain.gain.value = 0;
});

// ================== THREE SETUP ==================
const LANES = [-2.6, 0, 2.6];
const COLORS = {
  bg:0x1a0b2e, fog:0x2a1040, cyan:0x73eff7, pink:0xff6b97,
  gold:0xffd75e, purple:0x7b2fbf, dark:0x14101f, green:0xa7f070
};

let renderer, scene, camera;
try {
  renderer = new THREE.WebGLRenderer({ canvas: $('game'), antialias: false, powerPreference: 'high-performance' });
} catch (e) {
  $('loading').innerHTML = '<div style="padding:30px;text-align:center">⚠️ Ton navigateur ne supporte pas WebGL.<br>Essaie de mettre à jour iOS/Safari.</div>';
  throw e;
}
renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
scene = new THREE.Scene();
scene.fog = new THREE.Fog(COLORS.fog, 30, 150);
camera = new THREE.PerspectiveCamera(68, 1, 0.1, 400);

function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

scene.add(new THREE.AmbientLight(0x8866cc, 0.85));
const dirLight = new THREE.DirectionalLight(0xffaadd, 0.9);
dirLight.position.set(6, 12, 4);
scene.add(dirLight);

// ---------- materials / geometry helpers ----------
const _mats = new Map();
function mat(color, emissive, ei) {
  const key = color + '_' + (emissive || 0) + '_' + (ei || 0);
  if (!_mats.has(key))
    _mats.set(key, new THREE.MeshLambertMaterial({ color, emissive: emissive || 0x000000, emissiveIntensity: ei || 1 }));
  return _mats.get(key);
}
function box(parent, w, h, d, color, x, y, z, emissive, ei) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat(color, emissive, ei));
  m.position.set(x, y, z);
  parent.add(m);
  return m;
}
function canvasTex(w, h, draw) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  draw(c.getContext('2d'), w, h);
  const t = new THREE.CanvasTexture(c);
  return t;
}

// ---------- sky ----------
const skyTex = canvasTex(1024, 512, (g, w, h) => {
  const grad = g.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#0d0221'); grad.addColorStop(0.55, '#4b1248'); grad.addColorStop(1, '#c33e63');
  g.fillStyle = grad; g.fillRect(0, 0, w, h);
  // stars
  for (let i = 0; i < 210; i++) {
    g.globalAlpha = 0.25 + Math.random() * 0.65;
    g.fillStyle = '#fff';
    g.fillRect(Math.random() * w, Math.random() * h * 0.62, Math.random() > 0.85 ? 3 : 1.6, Math.random() > 0.85 ? 3 : 1.6);
  }
  g.globalAlpha = 1;
  // sun
  const sx = w * 0.5, sy = h * 0.70, sr = h * 0.17;
  const sg = g.createLinearGradient(0, sy - sr, 0, sy + sr);
  sg.addColorStop(0, '#ffd75e'); sg.addColorStop(1, '#ff2e88');
  g.save();
  g.beginPath(); g.arc(sx, sy, sr, 0, Math.PI * 2); g.clip();
  g.fillStyle = sg; g.fillRect(sx - sr, sy - sr, sr * 2, sr * 2);
  g.fillStyle = '#4b1248';

// ================== GAME STATE ==================
let state = 'menu';   // menu | shop | play | crash | over
let lane = 1, playerX = 0;
let speed = 0, dist = 0, extraScore = 0, runCoins = 0, score = 0;
let nextSpawn = 0, nextCoin = 0;
let timeScale = 1, shakeT = 0, crashT = 0;
let tutoShown = false, swipeCount = 0;

const SPEED_START = 26, SPEED_MAX = 64;

function resetRun() {
  for (const o of obstacles) scene.remove(o.group);
  obstacles.length = 0;
  for (const c of coins) scene.remove(c.group);
  coins.length = 0;
  for (const d of debris) d.m.visible = false;
  lane = 1; playerX = 0;
  speed = SPEED_START; dist = 0; extraScore = 0; runCoins = 0; score = 0;
  nextSpawn = 90; nextCoin = 0;
  timeScale = 1; shakeT = 0;
  playerV.position.set(0, 0, 0);
  playerV.rotation.set(0, 0, 0);
  playerV.visible = true;
}

function startGame() {
  initAudio();
  if (!playerV || playerV.userData.id !== store.equip) setPlayerVehicle(store.equip);
  resetRun();
  state = 'play';
  showcase.visible = false;
  $('menu').classList.add('hidden');
  $('shop').classList.add('hidden');
  $('over').classList.add('hidden');
  $('hud').classList.remove('hidden');
  updateHUD();
  if (!localStorage.getItem(LS.tut)) {
    $('tuto').classList.remove('hidden');
    tutoShown = true; swipeCount = 0;
    setTimeout(hideTuto, 4500);
  }
}

function hideTuto() {
  if (!tutoShown) return;
  tutoShown = false;
  $('tuto').classList.add('hidden');
  localStorage.setItem(LS.tut, '1');
}

function goMenu() {
  state = 'menu';
  showcase.visible = true;
  setShowVehicle(store.equip);
  if (playerV) playerV.visible = false;
  $('menu').classList.remove('hidden');
  $('shop').classList.add('hidden');
  $('over').classList.add('hidden');
  $('hud').classList.add('hidden');
  refreshBank();
}

function doCrash() {
  if (state !== 'play') return;
  state = 'crash';
  crashT = 1.05;
  timeScale = 0.22;
  shakeT = 0.9;
  sfxCrash();
  explode(playerV.position.x, 0.8, 0);
  playerV.visible = false;
  if (engineGain) engineGain.gain.value = 0;
  if (navigator.vibrate) navigator.vibrate(180);
}

function endRun() {
  state = 'over';
  timeScale = 1;
  const bonus = Math.floor(score / 25);
  const gained = runCoins + bonus;
  store.bank = store.bank + gained;
  const isNew = score > store.best;
  if (isNew) store.best = score;
  $('final-score').textContent = score;
  $('earned').textContent = '🪙 +' + gained + '  (' + runCoins + ' ramassées + ' + bonus + ' bonus)';
  $('over-best').textContent = '★ Record : ' + store.best;
  $('newrec').classList.toggle('hidden', !isNew);
  $('over').classList.remove('hidden');
  $('hud').classList.add('hidden');
  refreshBank();
}

function changeLane(dir) {
  if (state !== 'play') return;
  const nl = Math.max(0, Math.min(2, lane + dir));
  if (nl !== lane) {
    lane = nl;
    sfxWhoosh();
    if (tutoShown && ++swipeCount >= 2) hideTuto();
  }
}

// ================== SPAWN ==================
function spawnRow() {
  const hard = Math.min(0.62, 0.22 + dist / 2600);
  const two = Math.random() < hard;
  const lanes = [0, 1, 2];
  const blocked = [];
  blocked.push(lanes.splice(Math.floor(Math.random() * 3), 1)[0]);
  if (two) blocked.push(lanes.splice(Math.floor(Math.random() * 2), 1)[0]);
  for (const l of blocked) {
    let kind;
    const r = Math.random();
    if (r < 0.42) kind = 'car';
    else if (r < 0.6 && dist > 500) kind = 'truck';
    else kind = 'barrier';
    const g = buildTraffic(kind);
    const ownSpeed = kind === 'barrier' ? 0 : (kind === 'truck' ? 9 + Math.random() * 4 : 12 + Math.random() * 6);
    g.position.set(LANES[l], 0, -165 - Math.random() * 8);
    scene.add(g);
    obstacles.push({ group: g, lane: l, speed: ownSpeed, len: g.userData.len, passed: false, kind });
  }
  // maybe coins on a free lane
  if (Math.random() < 0.65 && lanes.length) {
    const cl = lanes[Math.floor(Math.random() * lanes.length)];
    for (let i = 0; i < 5; i++) {
      const c = makeCoin();
      c.position.x = LANES[cl];
      c.position.z = -185 - i * 2.4;
      scene.add(c);
      coins.push({ group: c, lane: cl, taken: false });
    }
  }
}

// ================== UPDATE ==================
const camPos = new THREE.Vector3();
const camLook = new THREE.Vector3();
let lastFov = 0;

function update(dt) {
  const ts = timeScale;
  const d = dt * ts;

  // debris always
  for (const de of debris) {
    if (!de.m.visible) continue;
    de.life -= dt * 1.1;
    if (de.life <= 0) { de.m.visible = false; continue; }
    de.vy -= 14 * d;
    de.m.position.x += de.vx * d;
    de.m.position.y = Math.max(0.1, de.m.position.y + de.vy * d);
    de.m.position.z += de.vz * d;
    de.m.rotation.x += 6 * d; de.m.rotation.y += 5 * d;
    de.m.scale.setScalar(Math.max(0.05, de.life) * 1.4);
  }

  if (state === 'menu' || state === 'shop') {
    showcase.rotation.y += dt * 0.7;
    if (showVehicle && showVehicle.userData.hover) {
      showVehicle.position.y = 0.25 + Math.sin(performance.now() / 400) * 0.12;
      if (showVehicle.userData.ring) showVehicle.userData.ring.rotation.y += dt * 3;
    }
    if (showVehicle && showVehicle.userData.lights) blinkLights(showVehicle, performance.now());
    camPos.set(Math.sin(performance.now()/9000) * 0.6, 2.6, 2.6);
    camLook.set(0, 0.9, -3.4);
  }

  if (state === 'play' || state === 'crash') {
    // world scroll
    speed = Math.min(SPEED_MAX, speed + 0.55 * d);
    dist += speed * d;
    score = Math.floor(dist) + extraScore;

    roadTex.offset.y -= speed * d / (ROAD_LEN / 30);
    gridTex.offset.y -= speed * d / 4;

    for (const b of buildings) {
      b.position.z += speed * d;
      if (b.position.z > 30) resetBuilding(b, false);
    }
    for (const a of arches) {
      a.position.z += speed * d;
      if (a.position.z > 14) a.position.z -= 350;
    }

    // player
    if (state === 'play') {
      const targetX = LANES[lane];
      const diff = targetX - playerX;
      playerX += diff * Math.min(1, 11 * d);
      playerV.position.x = playerX;
      playerV.rotation.z = THREE.MathUtils.clamp(-diff * 0.22, -0.32, 0.32);
      playerV.rotation.y = THREE.MathUtils.clamp(-diff * 0.06, -0.12, 0.12);
      if (playerV.userData.hover) {
        playerV.position.y = 0.15 + Math.sin(performance.now() / 260) * 0.1;
        if (playerV.userData.ring) playerV.userData.ring.rotation.y += dt * 4;
        if (playerV.userData.disc) playerV.userData.disc.rotation.y += dt * 1.5;
      }
      for (const w of playerV.userData.wheels) w.rotation.x -= speed * d * 2.6;
      if (playerV.userData.lights) blinkLights(playerV, performance.now());
      if (engineGain && musicOn) {
        engineGain.gain.value = 0.05;
        engineOsc.frequency.value = 55 + speed * 1.6;
        engineFilter.frequency.value = 240 + speed * 6;
      }
    }

    // obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.group.position.z += (speed - o.speed) * d;
      for (const w of o.group.userData.wheels) w.rotation.x -= o.speed * d * 2.6;
      const oz = o.group.position.z;
      if (!o.passed && oz > 2.4 && state === 'play') {
        o.passed = true;
        const dx = Math.abs(o.group.position.x - playerX);
        if (dx > 1.4 && dx < 3.6) {
          extraScore += 5;
          fxText('+5 FRÔLÉ !', '#73eff7', 0.5 + (Math.random()-0.5)*0.2, 0.42);
        }
      }
      if (oz > 16) {
        scene.remove(o.group);
        obstacles.splice(i, 1);
        continue;
      }
      // collision
      if (state === 'play' && Math.abs(o.group.position.x - playerX) < 1.65) {
        const halfLen = (o.len + 3.3) / 2 - 0.55;
        if (Math.abs(oz) < halfLen) doCrash();
      }
    }

    // coins
    for (let i = coins.length - 1; i >= 0; i--) {
      const c = coins[i];
      c.group.position.z += speed * d;
      c.group.rotation.y += 4.5 * dt;
      const cz = c.group.position.z;
      if (!c.taken && state === 'play' && Math.abs(cz) < 1.4 && Math.abs(c.group.position.x - playerX) < 1.3) {
        c.taken = true;
        runCoins++;
        extraScore += 5;
        sfxCoin();
        fxText('+🪙', '#ffd75e', 0.5, 0.5);
        scene.remove(c.group);
        coins.splice(i, 1);
        updateHUD();
        continue;
      }
      if (cz > 5) { scene.remove(c.group); coins.splice(i, 1); }
    }

    // spawn based on distance
    nextSpawn -= speed * d;
    if (nextSpawn <= 0) {
      spawnRow();
      const gap = Math.max(30, 58 - dist / 120);
      nextSpawn = gap;
    }

    updateHUD();

    // camera play
    camPos.set(playerX * 0.55, 4.15, 7.6);
    camLook.set(playerX * 0.65, 1.0, -8);
    const fov = 66 + (speed - SPEED_START) * 0.28;
    if (Math.abs(fov - lastFov) > 0.4) { camera.fov = fov; camera.updateProjectionMatrix(); lastFov = fov; }

    if (state === 'crash') {
      crashT -= dt;
      timeScale = Math.max(0.22, timeScale);
      if (crashT <= 0) endRun();
    }
  }

  // shake
  if (shakeT > 0) {
    shakeT -= dt;
    camPos.x += (Math.random() - 0.5) * shakeT * 1.6;
    camPos.y += (Math.random() - 0.5) * shakeT * 1.2;
  }

  camera.position.lerp(camPos, Math.min(1, dt * 10));
  camera.lookAt(camLook);
}

function blinkLights(v, t) {
  const on = Math.floor(t / 180) % 2 === 0;
  v.userData.lights[0].material = mat(0xff2244, 0xff2244, on ? 2.2 : 0.25);
  v.userData.lights[1].material = mat(0x2266ff, 0x2266ff, on ? 0.25 : 2.2);
}

function updateHUD() {
  $('score').textContent = score;
  $('runcoins').textContent = '🪙 ' + runCoins;
  $('speed').textContent = Math.round(speed * 3.6) + ' km/h';
}

// ================== RENDER LOOP ==================
let lastT = 0;
function loop(t) {
  requestAnimationFrame(loop);
  const dt = lastT ? Math.min((t - lastT) / 1000, 0.05) : 0.016;
  lastT = t;
  update(dt);
  renderer.render(scene, camera);
}

// ================== INPUT ==================
let tsX = 0, tsY = 0, tsT = 0, swiped = false;
window.addEventListener('touchstart', (e) => {
  if (e.target.closest('.btn') || e.target.closest('.car-card') || e.target.closest('#mute') || e.target.closest('.sheet')) return;
  const t = e.touches[0];
  tsX = t.clientX; tsY = t.clientY; tsT = performance.now(); swiped = false;
  if (e.cancelable) e.preventDefault();
}, { passive: false });

window.addEventListener('touchmove', (e) => {
  if (e.target.closest('.sheet')) return;
  if (e.cancelable) e.preventDefault();
  if (swiped) return;
  const t = e.touches[0];
  const dx = t.clientX - tsX, dy = t.clientY - tsY;
  if (Math.abs(dx) > 26 && Math.abs(dx) > Math.abs(dy) * 1.2) {
    swiped = true;
    changeLane(dx > 0 ? 1 : -1);
  }
}, { passive: false });

window.addEventListener('touchend', (e) => {
  if (e.target.closest('.btn') || e.target.closest('.car-card') || e.target.closest('#mute') || e.target.closest('.sheet')) return;
  if (!swiped && performance.now() - tsT < 260) {
    if (state === 'play') sfxHorn();
  }
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'ArrowLeft')  { e.preventDefault(); changeLane(-1); }
  if (e.code === 'ArrowRight') { e.preventDefault(); changeLane(1); }
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'menu') startGame();
    else if (state === 'over') startGame();
    else sfxHorn();
  }
});

document.addEventListener('visibilitychange', () => {
  if (AC) { if (document.hidden) AC.suspend(); else if (musicOn) AC.resume(); }
});

// ================== SHOP ==================
function refreshBank() {
  $('bank-menu').textContent = '🪙 ' + store.bank;
  $('best-label').textContent = '★ Record : ' + store.best;
}

function renderShop() {
  const wrap = $('cars');
  wrap.innerHTML = '';
  const owned = store.owned, eq = store.equip, bank = store.bank;
  $('shop-sub').textContent = '🪙 ' + bank + ' pièces — touche un bolide pour le voir en 3D';
  for (const v of VEHICLES) {
    const has = owned.includes(v.id);
    const card = document.createElement('div');
    card.className = 'car-card' + (showVehicle && showVehicle.userData.id === v.id ? ' selected' : '');
    let actHtml;
    if (has && eq === v.id) actHtml = '<button class="act equipped">✓ Équipé</button>';
    else if (has)          actHtml = '<button class="act equip">Équiper</button>';
    else if (bank >= v.price) actHtml = '<button class="act buy">🪙 ' + v.price + '</button>';
    else                   actHtml = '<button class="act locked">🔒 🪙 ' + v.price + '</button>';
    card.innerHTML = '<div class="emoji">' + v.emoji + '</div><div class="nm">' + v.name + '</div><div class="desc">' + v.desc + '</div>' + actHtml;
    card.addEventListener('click', (e) => {
      setShowVehicle(v.id);
      renderShop();
      if (e.target.classList.contains('buy')) {
        store.bank = store.bank - v.price;
        const o = store.owned; o.push(v.id); store.owned = o;
        store.equip = v.id;
        sfxCash();
        toast('🎉 ' + v.name + ' débloqué !');
        refreshBank(); renderShop();
      } else if (e.target.classList.contains('equip')) {
        store.equip = v.id;
        sfxCoin();
        toast(v.name + ' équipé');
        renderShop();
      } else if (e.target.classList.contains('locked')) {
        sfxDeny();
        toast('Pas assez de pièces ! Joue pour en gagner 🪙');
      }
    });
    wrap.appendChild(card);
  }
}

$('shop-btn').addEventListener('click', () => {
  initAudio();
  state = 'shop';
  $('menu').classList.add('hidden');
  $('shop').classList.remove('hidden');
  renderShop();
});
$('shop-close').addEventListener('click', () => {
  setShowVehicle(store.equip);
  goMenu();
});

// ================== BUTTONS ==================
$('play-btn').addEventListener('click', startGame);
$('retry-btn').addEventListener('click', startGame);
$('menu-btn').addEventListener('click', goMenu);
$('share-btn').addEventListener('click', async (e) => {
  e.stopPropagation();
  const txt = '🏁 J\'ai fait ' + score + ' points sur NEON DRIFT 3D ! Essaie de me battre 🚗💨';
  if (navigator.share) {
    try { await navigator.share({ title: 'NEON DRIFT 3D', text: txt, url: location.href }); } catch (_) {}
  } else {
    try { await navigator.clipboard.writeText(txt + ' ' + location.href); toast('Lien copié !'); } catch (_) {}
  }
});

// ================== INIT ==================
setPlayerVehicle(store.equip);
setShowVehicle(store.equip);
refreshBank();
camera.position.set(0, 2.6, 2.6);
camera.lookAt(0, 0.9, -3.4);
$('loading').classList.add('hidden');
requestAnimationFrame(loop);

// debug hooks (used by automated tests)
window.__nd = {
  state: () => state,
  swipe: (d) => changeLane(d),
  crash: () => doCrash(),
  start: () => startGame(),
  bank: () => store.bank
};

// ================== SW ==================
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
})();
</script>
