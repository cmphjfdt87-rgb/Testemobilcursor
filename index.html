<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pixel Rush">
<meta name="theme-color" content="#1a1c2c">
<meta name="description" content="PIXEL RUSH — un runner pixel-art néon. Cours, saute, esquive les monstres et bats le record !">
<title>PIXEL RUSH</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:#1a1c2c; font-family:'Courier New',monospace; user-select:none; -webkit-user-select:none; touch-action:none; }
#game { display:block; width:100vw; height:100vh; image-rendering:pixelated; image-rendering:crisp-edges; }
#ui { position:fixed; inset:0; pointer-events:none; z-index:10; }
.btn {
  pointer-events:auto; cursor:pointer; border:none; font-family:inherit; font-weight:bold;
  background:#ff6b97; color:#1a1c2c; font-size:1rem; padding:12px 26px;
  box-shadow:0 4px 0 #b13e63, 0 0 24px rgba(255,107,151,.5);
  letter-spacing:.1em; text-transform:uppercase;
}
.btn:active { transform:translateY(3px); box-shadow:0 1px 0 #b13e63; }
#share-btn { position:fixed; left:50%; transform:translateX(-50%); bottom:calc(18% - 90px); display:none; }
#sound-btn {
  pointer-events:auto; position:fixed; top:max(12px, env(safe-area-inset-top)); right:14px;
  background:none; border:none; font-size:1.5rem; cursor:pointer; opacity:.8;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <button id="share-btn" class="btn">Partager mon score</button>
  <button id="sound-btn">🔊</button>
</div>
<script>
(() => {
'use strict';

// ============ CANVAS ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const shareBtn = document.getElementById('share-btn');
const soundBtn = document.getElementById('sound-btn');

let vw, vh, u, groundY;

// ============ PALETTE ============
const PAL = {
  K:'#1a1c2c', C:'#73eff7', P:'#ff6b97', W:'#f4f4f4',
  G:'#a7f070', D:'#38b764', V:'#a970ff', Y:'#ffcd75', O:'#f77622'
};

// ============ SPRITES (pixel maps) ============
const HERO_RUN0 = [
"..KKKKKKKK..",
".KKKKKKKKKK.",
".KWWKKKKWWK.",
".KWCKKKKWCK.",
".KKKKKKKKKK.",
"..KKKKKKKK..",
".PPPPPPPPPP.",
"PPKKKKKKKKPP",
"P..KKKKKK...",
"...KKCCKK...",
"...KKKKKK...",
"..KKK..KKK..",
"..KK....KK..",
"..KK....KK.."
];
const HERO_RUN1 = [
"..KKKKKKKK..",
".KKKKKKKKKK.",
".KWWKKKKWWK.",
".KWCKKKKWCK.",
".KKKKKKKKKK.",
"..KKKKKKKK..",
".PPPPPPPPPP.",
"PPKKKKKKKKPP",
"P..KKKKKK...",
"...KKCCKK...",
"...KKKKKK...",
"...KKKKKK...",
"....KKKK....",
"...KK..KK..."
];
const HERO_JUMP = [
"..KKKKKKKK..",
".KKKKKKKKKK.",
".KWWKKKKWWK.",
".KWCKKKKWCK.",
".KKKKKKKKKK.",
"..KKKKKKKK..",
".PPPPPPPPPP.",
"PPKKKKKKKKPP",
"PP.KKKKKK...",
"...KKCCKK...",
"...KKKKKK...",
"..KKKKKKKK..",
"..KKK..KKK..",
"............"
];
const SLIME0 = [
"............",
"...KKKKKK...",
"..KGGGGGGK..",
".KGWKGGWKGK.",
"KGGGGGGGGGGK",
"KGGGGGGGGGGK",
"KGDDDDDDDDGK",
".KKKKKKKKKK."
];
const SLIME1 = [
"............",
"............",
"..KKKKKKKK..",
".KGWKGGWKGK.",
"KGGGGGGGGGGK",
"KGGGGGGGGGGK",
"KDDDDDDDDDDK",
".KKKKKKKKKK."
];
const BAT0 = [
".KK........KK.",
".KKK......KKK.",
"..KKKVVVVKKK..",
"....KVWWVK....",
"....KVVVVK....",
".....KKKK....."
];
const BAT1 = [
"..............",
"..............",
"..KKKVVVVKKK..",
".KKKKVWWVKKKK.",
"KKK.KVVVVK.KKK",
".....KKKK....."
];
const COIN0 = [
"..KKKK..",
".KYYYYK.",
"KYWYYYYK",
"KYYYYYYK",
"KYYYYYYK",
"KYYYYOYK",
".KYOOYK.",
"..KKKK.."
];
const COIN1 = [
"...KK...",
"..KYYK..",
".KYWYYK.",
".KYYYYK.",
".KYYYYK.",
".KYYOYK.",
"..KYYK..",
"...KK..."
];
const COIN2 = [
"...KK...",
"...KK...",
"...YY...",
"...YY...",
"...YY...",
"...YY...",
"...KK...",
"...KK..."
];

function makeSprite(rows) {
  const h = rows.length, w = rows[0].length;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const cc = c.getContext('2d');
  for (let y = 0; y < h; y++)
    for (let x = 0; x < w; x++) {
      const ch = rows[y][x];
      if (ch !== '.') { cc.fillStyle = PAL[ch]; cc.fillRect(x, y, 1, 1); }
    }
  return c;
}

const SPR = {
  run: [makeSprite(HERO_RUN0), makeSprite(HERO_RUN1)],
  jump: makeSprite(HERO_JUMP),
  slime: [makeSprite(SLIME0), makeSprite(SLIME1)],
  bat: [makeSprite(BAT0), makeSprite(BAT1)],
  coin: [makeSprite(COIN0), makeSprite(COIN1), makeSprite(COIN2), makeSprite(COIN1)]
};

// ============ ETAT ============
const BEST_KEY = 'pixelrush-best';
let state = 'menu';           // menu | play | dying | over
let best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10);
let score = 0, coins = 0, dist = 0;
let speed = 0;
let frames = 0, dieTimer = 0, overTapDelay = 0;

const player = { x:0, y:0, vy:0, w:12, h:14, jumps:0, onGround:false, squash:0, anim:0 };
let obstacles = [], coinList = [], particles = [], texts = [];
let spawnDist = 0, shake = 0;

// decor
let mountains1 = [], mountains2 = [], cityBlocks = [], bgStars = [], clouds = [];
let scroll1 = 0, scroll2 = 0, scroll3 = 0, scroll4 = 0;

// ============ AUDIO ============
let AC = null, masterGain = null, musicOn = true, musicTimer = null, noteIdx = 0;
const BASSLINE = [110, 110, 130.8, 110, 87.3, 87.3, 98, 130.8];
const ARP = [220, 261.6, 329.6, 440, 329.6, 261.6, 523.3, 440];

function initAudio() {
  if (AC) return;
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = AC.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(AC.destination);
    startMusic();
  } catch (e) { AC = null; }
}

function beep(freq, dur, type, vol, slideTo) {
  if (!AC || !musicOn) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, AC.currentTime);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, AC.currentTime + dur);
  g.gain.setValueAtTime(vol || 0.12, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.connect(g); g.connect(masterGain);
  o.start(); o.stop(AC.currentTime + dur);
}

function sfxJump()  { beep(320, 0.15, 'square', 0.09, 640); }
function sfxDjump() { beep(420, 0.15, 'square', 0.09, 840); }
function sfxCoin()  { beep(880, 0.06, 'square', 0.10); setTimeout(() => beep(1318, 0.12, 'square', 0.10), 60); }
function sfxHit()   { beep(220, 0.4, 'sawtooth', 0.18, 40); }

function startMusic() {
  if (musicTimer || !AC) return;
  musicTimer = setInterval(() => {
    if (!musicOn || state === 'menu') return;
    const i = noteIdx % 8;
    beep(BASSLINE[i], 0.22, 'triangle', 0.10);
    if (noteIdx % 2 === 0) beep(ARP[(noteIdx / 2) % 8 | 0], 0.1, 'square', 0.035);
    noteIdx++;
  }, 140);
}

soundBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  musicOn = !musicOn;
  soundBtn.textContent = musicOn ? '🔊' : '🔇';
});

// ============ RESIZE ============
function resize() {
  const dpr = Math.min(devicePixelRatio || 1, 2);
  vw = window.innerWidth; vh = window.innerHeight;
  canvas.width = vw * dpr; canvas.height = vh * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.imageSmoothingEnabled = false;
  u = Math.max(3, Math.round(vw / 96));
  groundY = Math.round(vh * 0.76 / u) * u;
  player.x = Math.round(vw * 0.22);

  if (mountains1.length === 0) {
    for (let i = 0; i < 24; i++) mountains1.push(30 + Math.random() * 55);
    for (let i = 0; i < 24; i++) mountains2.push(15 + Math.random() * 40);
    for (let i = 0; i < 30; i++) cityBlocks.push({ h: 20 + Math.random() * 60, w: 18 + Math.random() * 26, win: Math.random() > 0.4 });
    for (let i = 0; i < 60; i++) bgStars.push({ x: Math.random(), y: Math.random() * 0.5, tw: Math.random() * 6.28, r: Math.random() > 0.8 ? 2 : 1 });
    for (let i = 0; i < 6; i++) clouds.push({ x: Math.random(), y: 0.08 + Math.random() * 0.25, w: 40 + Math.random() * 50 });
  }
}
window.addEventListener('resize', resize);
resize();

// ============ GAME LOGIC ============
function reset() {
  score = 0; coins = 0; dist = 0;
  speed = 2.6;
  player.y = groundY - player.h * u;
  player.vy = 0; player.jumps = 0; player.onGround = true; player.squash = 0;
  obstacles = []; coinList = []; particles = []; texts = [];
  spawnDist = vw * 1.4; shake = 0; frames = 0;
}

function startGame() { reset(); state = 'play'; noteIdx = 0; }

function jump() {
  if (player.onGround) {
    player.vy = -6.4 * u; player.onGround = false; player.jumps = 1;
    sfxJump(); dust(8);
  } else if (player.jumps === 1) {
    player.vy = -5.6 * u; player.jumps = 2;
    sfxDjump();
    ring(player.x + 6 * u, player.y + 14 * u);
  }
}

function dust(n) {
  for (let i = 0; i < n; i++)
    particles.push({ x: player.x + 6 * u + (Math.random() - 0.5) * 8 * u, y: groundY - 2,
      vx: -1 - Math.random() * 2, vy: -Math.random() * 2, life: 1, col: '#5d275d', sz: u });
}
function ring(x, y) {
  for (let i = 0; i < 10; i++) {
    const a = Math.PI * 2 * i / 10;
    particles.push({ x, y, vx: Math.cos(a) * 3, vy: Math.sin(a) * 3, life: 0.8, col: PAL.C, sz: u });
  }
}
function burst(x, y, col, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = 1 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 2, life: 1, col, sz: u * (Math.random() > 0.5 ? 1 : 2) });
  }
}

function spawn() {
  const r = Math.random();
  const gx = vw + 40;
  if (r < 0.32) {
    // spikes
    const n = 1 + Math.floor(Math.random() * Math.min(3, 1 + dist / 4000));
    for (let i = 0; i < n; i++)
      obstacles.push({ type:'spike', x: gx + i * 9 * u, y: groundY - 10 * u, w: 8 * u, h: 10 * u });
  } else if (r < 0.62) {
    obstacles.push({ type:'slime', x: gx, y: groundY - 8 * u, w: 12 * u, h: 8 * u, anim: 0 });
  } else if (r < 0.82 && dist > 2500) {
    const fy = groundY - (16 + Math.random() * 14) * u;
    obstacles.push({ type:'bat', x: gx, y: fy, baseY: fy, w: 14 * u, h: 6 * u, anim: 0, t: Math.random() * 6 });
  } else {
    // arc de pièces
    const n = 4 + Math.floor(Math.random() * 3);
    const baseY = groundY - (10 + Math.random() * 18) * u;
    for (let i = 0; i < n; i++)
      coinList.push({ x: gx + i * 11 * u, y: baseY - Math.sin(i / (n - 1) * Math.PI) * 8 * u, w: 8 * u, h: 8 * u });
  }
  spawnDist = (34 + Math.random() * 30) * speed * u / 3;
}

function hit(a, b, m) {
  m = m || 0;
  return a.x + m < b.x + b.w - m && a.x + a.w - m > b.x + m &&
         a.y + m < b.y + b.h - m && a.y + a.h - m > b.y + m;
}

function update(dt) {
  frames++;
  const t = frames / 60;

  // parallax scroll (toujours actif pour le menu vivant)
  const sc = (state === 'play' || state === 'dying') ? speed : 1.2;
  scroll1 += sc * 0.1 * dt; scroll2 += sc * 0.25 * dt;
  scroll3 += sc * 0.45 * dt; scroll4 += sc * dt;

  for (const p of particles) {
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 0.15 * dt; p.life -= 0.03 * dt;
  }
  particles = particles.filter(p => p.life > 0);
  for (const tx of texts) { tx.y -= 1.2 * dt; tx.life -= 0.02 * dt; }
  texts = texts.filter(tx => tx.life > 0);
  if (shake > 0) shake *= Math.pow(0.86, dt);

  if (state === 'dying') {
    dieTimer -= dt;
    if (dieTimer <= 0) { state = 'over'; overTapDelay = 30; shareBtn.style.display = 'block'; }
    return;
  }
  if (state === 'over') { if (overTapDelay > 0) overTapDelay -= dt; return; }
  if (state !== 'play') return;

  // vitesse & distance
  speed = Math.min(7.5, 2.6 + dist * 0.00045);
  dist += speed * u * dt / 3;
  score = Math.floor(dist / 20) + coins * 10;

  // physique joueur
  player.vy += 0.42 * u * dt;
  player.y += player.vy * dt;
  const floorY = groundY - player.h * u;
  if (player.y >= floorY) {
    if (!player.onGround) { player.squash = 6; dust(5); }
    player.y = floorY; player.vy = 0; player.onGround = true; player.jumps = 0;
  }
  if (player.squash > 0) player.squash -= dt;
  player.anim += dt * (0.1 + speed * 0.02);

  // spawn
  spawnDist -= speed * u * dt / 3;
  if (spawnDist <= 0) spawn();

  // obstacles
  for (const o of obstacles) {
    o.x -= speed * u * dt / 3;
    if (o.type === 'slime') o.anim += dt * 0.08;
    if (o.type === 'bat') { o.t += dt * 0.1; o.y = o.baseY + Math.sin(o.t) * 5 * u; o.anim += dt * 0.15; }
  }
  obstacles = obstacles.filter(o => o.x + o.w > -60);

  // pièces
  for (const c of coinList) {
    c.x -= speed * u * dt / 3;
    if (!c.got && hit(player.hitbox(), c, 0)) {
      c.got = true; coins++;
      sfxCoin();
      burst(c.x + 4 * u, c.y + 4 * u, PAL.Y, 8);
      texts.push({ x: c.x, y: c.y, txt: '+10', life: 1, col: PAL.Y });
    }
  }
  coinList = coinList.filter(c => !c.got && c.x + c.w > -60);

  // collisions
  const hb = player.hitbox();
  for (const o of obstacles) {
    if (hit(hb, o, u)) {
      state = 'dying'; dieTimer = 45; shake = 18;
      sfxHit();
      burst(player.x + 6 * u, player.y + 7 * u, PAL.P, 24);
      burst(player.x + 6 * u, player.y + 7 * u, PAL.C, 16);
      if (score > best) { best = score; localStorage.setItem(BEST_KEY, best); }
      if (navigator.vibrate) navigator.vibrate(120);
      break;
    }
  }
}

player.hitbox = function () {
  return { x: this.x + 2 * u, y: this.y + 2 * u, w: 8 * u, h: 11 * u };
};

// ============ RENDU ============
function px(x) { return Math.round(x / u) * u; }

function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, groundY);
  g.addColorStop(0, '#1a1c2c'); g.addColorStop(0.5, '#5d275d'); g.addColorStop(1, '#b13e53');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, vw, groundY);

  // étoiles
  const t = frames / 60;
  for (const s of bgStars) {
    const a = 0.3 + Math.abs(Math.sin(t * 1.5 + s.tw)) * 0.5;
    ctx.globalAlpha = a;
    ctx.fillStyle = '#f4f4f4';
    ctx.fillRect(px(s.x * vw), px(s.y * vh), s.r * (u / 2), s.r * (u / 2));
  }
  ctx.globalAlpha = 1;

  // soleil synthwave
  const sunR = vw * 0.16, sunX = vw * 0.72, sunY = groundY * 0.62;
  const sg = ctx.createLinearGradient(0, sunY - sunR, 0, sunY + sunR);
  sg.addColorStop(0, '#ffcd75'); sg.addColorStop(1, '#ff6b97');
  ctx.save();
  ctx.beginPath(); ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2); ctx.clip();
  ctx.fillStyle = sg;
  ctx.fillRect(sunX - sunR, sunY - sunR, sunR * 2, sunR * 2);
  // bandes
  ctx.fillStyle = 'rgba(93,39,93,0.9)';
  for (let i = 0; i < 5; i++) {
    const bh = 2 + i * 1.5;
    ctx.fillRect(sunX - sunR, sunY + i * 12 + 6, sunR * 2, bh);
  }
  ctx.restore();

  // nuages pixel
  ctx.fillStyle = 'rgba(115,239,247,0.12)';
  for (const c of clouds) {
    const cx2 = ((c.x * vw - scroll1 * 0.5) % (vw + c.w * 2)) + ((c.x * vw - scroll1 * 0.5) < -c.w * 2 ? vw + c.w * 2 : 0);
    const wrapX = ((cx2 % (vw + 120)) + vw + 120) % (vw + 120) - 60;
    ctx.fillRect(px(wrapX), px(c.y * vh), c.w, u * 2);
    ctx.fillRect(px(wrapX + 10), px(c.y * vh - u * 2), c.w * 0.6, u * 2);
  }
}

function drawMountains(arr, sc, col, hMul) {
  ctx.fillStyle = col;
  const seg = vw / 3.2;
  const off = sc % (seg * arr.length);
  ctx.beginPath();
  ctx.moveTo(-seg, groundY);
  for (let i = -1; i < 10; i++) {
    const idx = ((Math.floor(sc / seg) + i) % arr.length + arr.length) % arr.length;
    const x = i * seg - (sc % seg);
    ctx.lineTo(x + seg / 2, groundY - arr[idx] * hMul * (vh / 400));
    ctx.lineTo(x + seg, groundY);
  }
  ctx.lineTo(vw + seg, groundY);
  ctx.closePath();
  ctx.fill();
}

function drawCity() {
  const totalW = cityBlocks.reduce((s, b) => s + b.w, 0);
  let x = -(scroll3 % totalW);
  ctx.fillStyle = '#1a1c2c';
  for (let rep = 0; rep < 2; rep++) {
    for (const b of cityBlocks) {
      if (x + b.w > 0 && x < vw) {
        const bh = b.h * (vh / 500);
        ctx.fillRect(px(x), groundY - bh, b.w + 1, bh);
        if (b.win) {
          ctx.fillStyle = 'rgba(255,205,117,0.7)';
          ctx.fillRect(px(x + b.w * 0.3), groundY - bh * 0.7, u, u);
          ctx.fillRect(px(x + b.w * 0.6), groundY - bh * 0.45, u, u);
          ctx.fillStyle = '#1a1c2c';
        }
      }
      x += b.w;
    }
  }
}

function drawGround() {
  ctx.fillStyle = '#12101f';
  ctx.fillRect(0, groundY, vw, vh - groundY);
  // ligne néon
  ctx.fillStyle = PAL.P;
  ctx.shadowColor = PAL.P; ctx.shadowBlur = 12;
  ctx.fillRect(0, groundY, vw, u);
  ctx.shadowBlur = 0;
  // grille verticale
  ctx.strokeStyle = 'rgba(255,107,151,0.22)';
  ctx.lineWidth = 1;
  const gsp = 14 * u;
  const off = scroll4 * u / 3 % gsp;
  for (let x = -off; x < vw; x += gsp) {
    ctx.beginPath();
    ctx.moveTo(x + gsp / 2, groundY + u);
    ctx.lineTo(x - (vw * 0.06), vh);
    ctx.stroke();
  }
  // lignes horizontales (perspective)
  let gy = groundY + u * 3, step = u * 2;
  while (gy < vh) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(vw, gy); ctx.stroke();
    step *= 1.6; gy += step;
  }
}

function drawSprite(spr, x, y, scale, flipX) {
  ctx.save();
  ctx.translate(px(x), px(y));
  if (flipX) { ctx.scale(-1, 1); ctx.translate(-spr.width * scale, 0); }
  ctx.drawImage(spr, 0, 0, spr.width * scale, spr.height * scale);
  ctx.restore();
}

function drawPlayer() {
  let spr;
  if (!player.onGround) spr = SPR.jump;
  else spr = SPR.run[Math.floor(player.anim) % 2];
  let sy = player.y, sx = player.x, sh = 1, sw = 1;
  if (player.squash > 0) { sh = 0.85; sw = 1.15; sy = groundY - player.h * u * sh; sx -= u; }
  ctx.save();
  ctx.shadowColor = PAL.C; ctx.shadowBlur = 10;
  ctx.translate(px(sx), px(sy));
  ctx.drawImage(spr, 0, 0, 12 * u * sw, 14 * u * sh);
  ctx.restore();
  // traînée écharpe
  if ((state === 'play') && frames % 3 === 0) {
    particles.push({ x: player.x, y: player.y + 7 * u, vx: -2 - speed * 0.4, vy: (Math.random() - 0.5), life: 0.5, col: PAL.P, sz: u });
  }
}

function drawObstacles() {
  for (const o of obstacles) {
    if (o.type === 'spike') {
      ctx.fillStyle = '#f4f4f4';
      ctx.beginPath();
      ctx.moveTo(px(o.x), groundY);
      ctx.lineTo(px(o.x) + o.w / 2, px(o.y));
      ctx.lineTo(px(o.x) + o.w, groundY);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = PAL.P;
      ctx.fillRect(px(o.x) + o.w / 2 - u / 2, px(o.y), u, u * 2);
    } else if (o.type === 'slime') {
      drawSprite(SPR.slime[Math.floor(o.anim) % 2], o.x, o.y, u);
    } else if (o.type === 'bat') {
      drawSprite(SPR.bat[Math.floor(o.anim) % 2], o.x, o.y, u);
    }
  }
}

function drawCoins() {
  const f = Math.floor(frames / 6) % 4;
  for (const c of coinList) drawSprite(SPR.coin[f], c.x, c.y, u);
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.col;
    ctx.fillRect(px(p.x), px(p.y), p.sz, p.sz);
  }
  ctx.globalAlpha = 1;
}

function drawTexts() {
  ctx.font = `bold ${Math.round(u * 3.2)}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  for (const t of texts) {
    ctx.globalAlpha = Math.max(0, t.life);
    ctx.fillStyle = t.col;
    ctx.fillText(t.txt, t.x, t.y);
  }
  ctx.globalAlpha = 1;
}

function outlineText(txt, x, y, size, col) {
  ctx.font = `bold ${size}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#1a1c2c';
  for (const [dx, dy] of [[-3,0],[3,0],[0,-3],[0,3],[-2,-2],[2,2],[-2,2],[2,-2]])
    ctx.fillText(txt, x + dx, y + dy);
  ctx.fillStyle = col;
  ctx.fillText(txt, x, y);
}

function drawHUD() {
  const topPad = Math.max(20, vh * 0.06);
  if (state === 'play' || state === 'dying') {
    outlineText(String(score), vw / 2, topPad + u * 6, u * 6, '#f4f4f4');
    // pièces
    drawSprite(SPR.coin[0], 14, topPad, u * 0.9);
    ctx.font = `bold ${u * 3.4}px 'Courier New', monospace`;
    ctx.textAlign = 'left';
    ctx.fillStyle = PAL.Y;
    ctx.fillText('×' + coins, 14 + u * 9, topPad + u * 6);
  }
}

function drawMenu() {
  const t = frames / 60;
  const bounce = Math.sin(t * 2.4) * u * 1.5;
  outlineText('PIXEL', vw / 2, vh * 0.26 + bounce, Math.min(vw * 0.15, 68), PAL.C);
  outlineText('RUSH', vw / 2, vh * 0.26 + Math.min(vw * 0.15, 68) + bounce, Math.min(vw * 0.15, 68), PAL.P);

  // héros qui court sur place
  const spr = SPR.run[Math.floor(t * 8) % 2];
  ctx.save();
  ctx.shadowColor = PAL.C; ctx.shadowBlur = 12;
  ctx.drawImage(spr, px(vw / 2 - 6 * u), px(groundY - 14 * u), 12 * u, 14 * u);
  ctx.restore();

  if (Math.floor(t * 2) % 2 === 0)
    outlineText('TAP POUR JOUER', vw / 2, vh * 0.62, u * 4, '#f4f4f4');

  ctx.font = `${u * 2.6}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(244,244,244,0.55)';
  ctx.fillText('Record : ' + best, vw / 2, vh * 0.68);
  ctx.fillText('1 tap = saut · 2 taps = double saut', vw / 2, vh * 0.93);
}

function drawOver() {
  ctx.fillStyle = 'rgba(18,16,31,0.75)';
  ctx.fillRect(0, 0, vw, vh);
  outlineText('GAME OVER', vw / 2, vh * 0.3, Math.min(vw * 0.11, 52), PAL.P);
  outlineText(String(score), vw / 2, vh * 0.44, Math.min(vw * 0.16, 76), '#f4f4f4');
  ctx.font = `bold ${u * 3}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.fillStyle = PAL.Y;
  ctx.fillText('🪙 ' + coins + '    ★ Record : ' + best, vw / 2, vh * 0.5);
  if (score >= best && score > 0) {
    const t = frames / 60;
    ctx.globalAlpha = 0.6 + Math.sin(t * 6) * 0.4;
    outlineText('NOUVEAU RECORD !', vw / 2, vh * 0.56, u * 4, PAL.C);
    ctx.globalAlpha = 1;
  }
  if (overTapDelay <= 0 && Math.floor(frames / 30) % 2 === 0)
    outlineText('TAP POUR REJOUER', vw / 2, vh * 0.66, u * 3.6, '#f4f4f4');
}

// scanlines rétro
let scanPat = null;
function makeScan() {
  const c = document.createElement('canvas');
  c.width = 4; c.height = 4;
  const cc = c.getContext('2d');
  cc.fillStyle = 'rgba(0,0,0,0.10)';
  cc.fillRect(0, 2, 4, 1);
  scanPat = ctx.createPattern(c, 'repeat');
}
makeScan();

function render() {
  ctx.save();
  if (shake > 0.5) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);

  drawSky();
  drawMountains(mountains1, scroll1, '#29366f', 1.0);
  drawMountains(mountains2, scroll2, '#3b3054', 0.7);
  drawCity();
  drawGround();
  drawCoins();
  drawObstacles();
  if (state !== 'menu' && (state !== 'dying' || Math.floor(frames / 3) % 2 === 0)) drawPlayer();
  drawParticles();
  drawTexts();
  drawHUD();
  if (state === 'menu') drawMenu();
  if (state === 'over') drawOver();

  ctx.restore();
  if (scanPat) { ctx.fillStyle = scanPat; ctx.fillRect(0, 0, vw, vh); }
}

// ============ BOUCLE ============
let lastT = 0;
function loop(ts) {
  const dt = lastT ? Math.min((ts - lastT) / 16.67, 2.5) : 1;
  lastT = ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ============ INPUT ============
function onTap(e) {
  if (e.target === shareBtn || e.target === soundBtn) return;
  if (e.cancelable) e.preventDefault();
  initAudio();
  if (AC && AC.state === 'suspended') AC.resume();
  if (state === 'menu') { startGame(); shareBtn.style.display = 'none'; }
  else if (state === 'play') jump();
  else if (state === 'over' && overTapDelay <= 0) { startGame(); shareBtn.style.display = 'none'; }
}
canvas.addEventListener('touchstart', onTap, { passive: false });
canvas.addEventListener('mousedown', onTap);
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); onTap(e); }
});

document.addEventListener('visibilitychange', () => {
  if (document.hidden && AC) AC.suspend();
  else if (AC) AC.resume();
});

// ============ PARTAGE ============
shareBtn.addEventListener('click', async (e) => {
  e.stopPropagation();
  const text = `⚡ J'ai fait ${score} points sur PIXEL RUSH ! Tu peux me battre ? 🕹️`;
  const url = location.href;
  if (navigator.share) {
    try { await navigator.share({ title: 'PIXEL RUSH', text, url }); } catch (_) {}
  } else {
    try {
      await navigator.clipboard.writeText(text + ' ' + url);
      shareBtn.textContent = 'Copié !';
      setTimeout(() => (shareBtn.textContent = 'Partager mon score'), 1500);
    } catch (_) {}
  }
});

// ============ SERVICE WORKER ============
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
})();
</script>
